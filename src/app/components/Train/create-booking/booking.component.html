<h1>Book Ticket</h1>

<form (ngSubmit)="bookTicket()">
  <label>Train ID:</label>
  <input type="number" [(ngModel)]="bghModel.TrainId" name="trainId" required>

  <h3>Passenger Details</h3>
  <div *ngFor="let passenger of passengers; let i = index">
    <label>Passenger {{ i + 1 }}</label>
    <div>
      <label>Name:</label>
      <input type="text" [(ngModel)]="passenger.Name" name="name" required>
    </div>
    <div>
      <label>Age:</label>
      <input type="number" [(ngModel)]="passenger.Age" name="age" required>
    </div>
    <div>
      <label>Gender:</label>
      <input type="text" [(ngModel)]="passenger.Gender" name="gender" required>
    </div>
    <button type="button" (click)="removePassenger(i)">Remove</button>
  </div>

  <button type="button" (click)="addPassenger()">Add Passenger</button>

  <button type="submit">Book Ticket</button>
</form>
